<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chess Rehearsal — Marketing Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; background: #f0eee9; font-family: var(--cr-font-body); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="MiniPhone.jsx"></script>
  <script type="text/babel" src="SiteComponents.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    function App() {
      // 1180px-wide artboards capturing the full marketing page
      const W = 1240;
      const HOME_H = 2280;
      const PRIVACY_H = 1450;

      return (
        <DesignCanvas>
          <DCSection id="home" title="Home page" subtitle="Two directions for the marketing landing page">
            <DCArtboard id="home-dark" label="A · Theatrical Dark" width={W} height={HOME_H}>
              <HomePageDark />
            </DCArtboard>
            <DCArtboard id="home-warm" label="B · Playful Warm" width={W} height={HOME_H}>
              <HomePageWarm />
            </DCArtboard>
          </DCSection>

          <DCSection id="privacy" title="Privacy page" subtitle="Long-form policy, comfortable reading width">
            <DCArtboard id="privacy-dark" label="A · Theatrical Dark" width={W} height={PRIVACY_H}>
              <PrivacyPage />
            </DCArtboard>
            <DCArtboard id="privacy-warm" label="B · Playful Warm" width={W} height={PRIVACY_H}>
              <PrivacyPage warm />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
